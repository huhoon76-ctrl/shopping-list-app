<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .app {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
      height: fit-content;
      overflow: hidden;
    }

    header {
      background: #4f46e5;
      color: #fff;
      padding: 24px;
    }

    header h1 { font-size: 1.5rem; font-weight: 700; }

    .stats {
      font-size: 0.85rem;
      opacity: 0.8;
      margin-top: 4px;
    }

    .input-area {
      display: flex;
      gap: 8px;
      padding: 16px;
      border-bottom: 1px solid #e5e7eb;
    }

    .input-area input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input:focus { border-color: #4f46e5; }

    .input-area button {
      padding: 10px 18px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-area button:hover { background: #4338ca; }

    .filters {
      display: flex;
      gap: 4px;
      padding: 10px 16px;
      border-bottom: 1px solid #e5e7eb;
    }

    .filter-btn {
      padding: 5px 12px;
      border: 1px solid #e5e7eb;
      background: #fff;
      border-radius: 20px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn.active {
      background: #4f46e5;
      border-color: #4f46e5;
      color: #fff;
    }

    .list {
      list-style: none;
      padding: 8px 0;
      min-height: 60px;
    }

    .empty {
      text-align: center;
      color: #9ca3af;
      padding: 32px;
      font-size: 0.95rem;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      transition: background 0.15s;
    }

    .item:hover { background: #f9fafb; }

    .item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 0.95rem;
      color: #111827;
      transition: all 0.2s;
      word-break: break-all;
    }

    .item.checked .item-text {
      text-decoration: line-through;
      color: #9ca3af;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #d1d5db;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .delete-btn:hover { color: #ef4444; background: #fef2f2; }

    .clear-bar {
      padding: 10px 16px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      justify-content: flex-end;
    }

    .clear-btn {
      background: none;
      border: none;
      color: #6b7280;
      font-size: 0.82rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: all 0.15s;
    }

    .clear-btn:hover { color: #ef4444; background: #fef2f2; }
  </style>
</head>
<body>
<div class="app">
  <header>
    <h1>🛒 쇼핑 리스트</h1>
    <div class="stats" id="stats">항목 없음</div>
  </header>

  <div class="input-area">
    <input type="text" id="itemInput" placeholder="아이템 추가..." maxlength="80">
    <button onclick="addItem()">추가</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">전체</button>
    <button class="filter-btn" onclick="setFilter('active', this)">미완료</button>
    <button class="filter-btn" onclick="setFilter('done', this)">완료</button>
  </div>

  <ul class="list" id="list"></ul>

  <div class="clear-bar">
    <button class="clear-btn" onclick="clearDone()">완료 항목 삭제</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://povabmetivjiuowejnvb.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_84kPy_0tfome-2_Pxz6Fzw_AXfk4SM7';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let items = [];
  let filter = 'all';

  function render() {
    const list = document.getElementById('list');
    const filtered = items.filter(item =>
      filter === 'all' ? true :
      filter === 'active' ? !item.done :
      item.done
    );

    list.innerHTML = filtered.length === 0
      ? `<li class="empty">${items.length === 0 ? '아이템을 추가해 보세요!' : '해당 항목이 없습니다.'}</li>`
      : filtered.map(item => `
        <li class="item ${item.done ? 'checked' : ''}" data-id="${item.id}">
          <input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggle(${item.id})">
          <span class="item-text">${escapeHtml(item.text)}</span>
          <button class="delete-btn" onclick="remove(${item.id})" title="삭제">✕</button>
        </li>
      `).join('');

    const total = items.length;
    const done = items.filter(i => i.done).length;
    document.getElementById('stats').textContent =
      total === 0 ? '항목 없음' : `${done} / ${total} 완료`;
  }

  async function loadItems() {
    const { data, error } = await db
      .from('shopping_items')
      .select('*')
      .order('created_at', { ascending: false });
    if (!error) { items = data; render(); }
  }

  async function addItem() {
    const input = document.getElementById('itemInput');
    const text = input.value.trim();
    if (!text) return;
    const newItem = { id: Date.now(), text, done: false };
    const { error } = await db.from('shopping_items').insert(newItem);
    if (!error) {
      items.unshift(newItem);
      input.value = '';
      render();
    }
    input.focus();
  }

  async function toggle(id) {
    const item = items.find(i => i.id === id);
    if (!item) return;
    const { error } = await db
      .from('shopping_items')
      .update({ done: !item.done })
      .eq('id', id);
    if (!error) { item.done = !item.done; render(); }
  }

  async function remove(id) {
    const { error } = await db.from('shopping_items').delete().eq('id', id);
    if (!error) { items = items.filter(i => i.id !== id); render(); }
  }

  async function clearDone() {
    const { error } = await db.from('shopping_items').delete().eq('done', true);
    if (!error) { items = items.filter(i => !i.done); render(); }
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.getElementById('itemInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addItem();
  });

  loadItems();
</script>
</body>
</html>
